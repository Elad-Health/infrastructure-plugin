name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all workspaces
        run: npm run build

      - name: Type check all workspaces
        run: |
          npx tsc --noEmit -p mcp-servers/mssql/tsconfig.json
          npx tsc --noEmit -p mcp-servers/prometheus/tsconfig.json
          npx tsc --noEmit -p mcp-servers/azure-devops/tsconfig.json
